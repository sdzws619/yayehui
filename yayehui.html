        function checkUsernameUnique() {

        // 瀵嗙爜鍔犲瘑鐩稿叧鍑芥暟锛堜娇鐢?Web Crypto API锛?
        async function generateSalt() {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            return Array.from(salt, b => b.toString(16).padStart(2, '0')).join('');
        }
        
        async function hashPassword(password, salt) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + salt);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer), b => b.toString(16).padStart(2, '0')).join('');
        }
        
        async function verifyPassword(password, salt, storedHash) {
            const hash = await hashPassword(password, salt);
            return hash === storedHash;
        }

    // 杈呭姪鍑芥暟
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function formatDate(dateStr) { if (!dateStr) return ''; return new Date(dateStr).toLocaleString(); }
    // 鍒嗛〉缁勪欢锛堟敮鎸佺敤鎴烽€夋嫨姣忛〉琛屾暟锛?
    function paginationHTML(current, total, prefixId, totalCount) {
        if (total <= 1) return '';
        const maxVisible = 5;
        let startPage = Math.max(1, current - Math.floor(maxVisible / 2));
        let endPage = Math.min(total, startPage + maxVisible - 1);
        if (endPage - startPage + 1 < maxVisible) {
            startPage = Math.max(1, endPage - maxVisible + 1);
        }
        
        let html = `<div class="pager-info">鍏?${totalCount} 鏉?/div>`;
        html += `<button class="pager-btn" onclick="goPage('${prefixId}',${current-1})" ${current===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
        
        for (let i = startPage; i <= endPage; i++) {
            html += `<button class="pager-btn ${i === current ? 'active' : ''}" onclick="goPage('${prefixId}',${i})">${i}</button>`;
        }
        
        html += `<button class="pager-btn" onclick="goPage('${prefixId}',${current+1})" ${current===total?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
        html += `<div class="pager-info">鍒?input type="number" class="page-jump" id="jump-${prefixId}" min="1" max="${total}" placeholder="椤?>`;
        html += `<button class="pager-btn" style="padding:4px 10px;" onclick="jumpToPage('${prefixId}',${total})">璺宠浆</button></div>`;
        
        // 姣忛〉琛屾暟閫夋嫨
        html += `<div class="pager-info" style="margin-left:12px;">姣忛〉<select class="page-size-select" onchange="changePageSize('${prefixId}',this.value)">`;
        for (let i = 1; i <= 10; i++) html += `<option value="${i}" ${pageSizes[prefixId]===i?'selected':''}>${i}</option>`;
        for (let i = 15; i <= 100; i+=5) html += `<option value="${i}" ${pageSizes[prefixId]===i?'selected':''}>${i}</option>`;
        html += `</select>鏉?/div>`;
        
        return html;
    }

    window.jumpToPage = function(prefix, total) {
        const input = document.getElementById('jump-' + prefix);

    // 娓叉煋鍗曚釜鎶曠エ
    async function renderSinglePoll(poll, container, isUpdate = false) {
        let options, votes;
        if (USE_SUPABASE) {
            options = await db.pollOptions.getByPollId(poll.id);
            options = options || [];
            votes = await db.votes.getByPollId(poll.id);
            votes = votes || [];
            
        } else {
            options = JSON.parse(localStorage.getItem('yayehui_poll_options') || '[]').filter(o => o.poll_id === poll.id);
            votes = JSON.parse(localStorage.getItem('yayehui_votes') || '[]');
            if (options.length === 0) options = DEFAULT_DATA.pollOptions.filter(o => o.poll_id === poll.id);
        }

        const totalVotes = votes.length;

    async function renderTopics() {
        const container = document.getElementById('topicsList');
        if (!container) return;
        try {
            let topics, replies;
            if (USE_SUPABASE) {
                topics = await db.topics.getAll();
                replies = [];
                for (const t of topics) {
                    const r = await db.replies.getByTopicId(t.id);
                    if (r) replies.push(...r);
                }
            } else {
                const topicsStored = localStorage.getItem('yayehui_topics');
                const repliesStored = localStorage.getItem('yayehui_replies');
                const initialized = localStorage.getItem('init_topics') === '1';
                if (topicsStored && topicsStored !== '[]') {
                    topics = JSON.parse(topicsStored);
                    replies = repliesStored ? JSON.parse(repliesStored) : [];
                } else if (!initialized) {
                    topics = DEFAULT_DATA.topics;
                    replies = DEFAULT_DATA.replies;
                    localStorage.setItem('yayehui_topics', JSON.stringify(topics));
                    localStorage.setItem('yayehui_replies', JSON.stringify(replies));
                    localStorage.setItem('init_topics', '1');
                // 鈿狅笍 鍒濆鍖栭€昏緫锛氫粎棣栨璁块棶鏃朵粠 DEFAULT_DATA 鍔犺浇锛屽垹闄ゅ悗涓嶈嚜鍔ㄦ仮澶?

                } else {
                    topics = [];
                    replies = [];
                }
            }
            
            if (topics.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>鐩墠鏆傛棤鏁版嵁</div>';
                document.getElementById('topicsPager').style.display = 'none';
                return;
            }
            
            const page = window.page_topics || 1;
            const pageSize = pageSizes['topics'] || 3;
            const total = Math.ceil(topics.length / pageSize);
            const pageTopics = topics.slice((page - 1) * pageSize, page * pageSize);
            container.innerHTML = '';
            if (pageTopics.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>鐩墠鏆傛棤鏁版嵁</div>'; document.getElementById('topicsPager').style.display = 'none'; return; }
            pageTopics.forEach(topic => {
                const replyCount = replies.filter(r => r.topic_id === topic.id).length;
                const div = document.createElement('div');
                div.className = 'topic-card';
                div.dataset.id = topic.id;
                div.innerHTML = `<h3>${escapeHtml(topic.title)}</h3><p>${escapeHtml((topic.content || '').substring(0, 100))}${(topic.content || '').length > 100 ? '...' : ''}</p><div class="topic-meta"><span>浣滆€咃細${escapeHtml(topic.author || '')}</span><span>娴忚 ${topic.view_count || 0}</span><span>鍥炲 ${replyCount}</span><span>${new Date(topic.created_at).toLocaleDateString()}</span></div>`;
                container.appendChild(div);
            });
            document.getElementById('topicsPager').innerHTML = paginationHTML(page, total, 'topics', topics.length);

            document.querySelectorAll('.topic-card').forEach(card => {
                card.onclick = async () => {
                    const id = parseInt(card.dataset.id);
                    currentTopicId = id;
                    let topic;
                    if (USE_SUPABASE) {
                        topic = await db.topics.getById(id);
                        if (topic && topic[0]) {
                            topic = topic[0];
                            await db.topics.update(id, { view_count: (topic.view_count || 0) + 1 });
                        }
                    } else {
                        let topicsData = JSON.parse(localStorage.getItem('yayehui_topics') || '[]');
                        topic = topicsData.find(t => t.id === id);
                        if (topic) { topic.view_count = (topic.view_count || 0) + 1; localStorage.setItem('yayehui_topics', JSON.stringify(topicsData)); }
                    }
                    let repliesData;
                    if (USE_SUPABASE) { repliesData = await db.replies.getByTopicId(id) || []; }
                    else { repliesData = JSON.parse(localStorage.getItem('yayehui_replies') || '[]').filter(r => r.topic_id === id); }
                    document.getElementById('replyTopicTitle').innerText = topic ? topic.title : '';
                    document.getElementById('repliesList').innerHTML = repliesData.map(r => `<div class="reply-item"><span class="reply-author">${escapeHtml(r.author || '')}</span><span class="reply-time">${formatDate(r.created_at)}</span><div>${escapeHtml(r.content || '')}</div></div>`).join('');

                    renderTopics();
                };
            });
        } catch (e) { container.innerHTML = '<p style="text-align:center;color:#c2410c;">鍔犺浇澶辫触</p>'; }
    }

    async function addTopic(title, content, author) {
        if (!title.trim() || !content.trim() || !author.trim()) return false;
        const topicData = { title: title.trim(), content: content.trim(), author: author.trim(), view_count: 0, reply_count: 0, created_at: new Date().toISOString() };
        if (USE_SUPABASE) await db.topics.create(topicData);
        else {
            let topics = JSON.parse(localStorage.getItem('yayehui_topics') || '[]');
            topicData.id = topics.length ? Math.max(...topics.map(t => t.id)) + 1 : 1;
            topics.push(topicData);
            localStorage.setItem('yayehui_topics', JSON.stringify(topics));
        }
        return true;
    }

    async function addReply(topicId, content, author) {
        if (!content.trim() || !author.trim()) return false;
        const replyData = { topic_id: topicId, content: content.trim(), author: author.trim(), created_at: new Date().toISOString() };
        if (USE_SUPABASE) {
            await db.replies.create(replyData);
            const topic = await db.topics.getById(topicId);
            if (topic && topic[0]) await db.topics.update(topicId, { reply_count: (topic[0].reply_count || 0) + 1 });
        } else {
            let replies = JSON.parse(localStorage.getItem('yayehui_replies') || '[]');
            replyData.id = replies.length ? Math.max(...replies.map(r => r.id)) + 1 : 1;
            replies.push(replyData);
            localStorage.setItem('yayehui_replies', JSON.stringify(replies));
            let topics = JSON.parse(localStorage.getItem('yayehui_topics') || '[]');
            const topic = topics.find(t => t.id === topicId);
            if (topic) { topic.reply_count = (topic.reply_count || 0) + 1; localStorage.setItem('yayehui_topics', JSON.stringify(topics)); }
        }
        return true;
    }

// 澶勭悊鐧诲綍
window.handleLogin = async function() {
    const account = document.getElementById('loginAccount').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    
    if (!account || !password) {
        alert('璇疯緭鍏ヨ处鍙峰拰瀵嗙爜');
        return;
    }
    
    try {
        let user = null;
        let isAdmin = false;
        
        // 鍏堟鏌ョ鐞嗗憳璐﹀彿
        if (USE_SUPABASE) {
            const admins = await db.adminAccounts.getAll() || [];
            const foundAdmin = admins.find(a => a.username === account);
            if (foundAdmin && foundAdmin.password === password) {
                user = { id: foundAdmin.id, user_name: foundAdmin.username, role: foundAdmin.role, is_admin: true };
                isAdmin = true;
            }
        } else {
            const admins = JSON.parse(localStorage.getItem('yayehui_admin_accounts') || '[]');
            const foundAdmin = admins.find(a => a.username === account);
            if (foundAdmin && foundAdmin.password === password) {
                user = { id: foundAdmin.id, user_name: foundAdmin.username, role: foundAdmin.role, is_admin: true };
                isAdmin = true;
            }
        }
        
        // 濡傛灉涓嶆槸绠＄悊鍛橈紝鍐嶆鏌ユ敞鍐岀敤鎴?
        if (!user) {
            if (USE_SUPABASE) {
                let users = await db.registeredUsers.getAll() || [];
                const foundUser = users.find(u => (u.user_name === account || u.phone === account));
                if (foundUser && foundUser.password_hash && foundUser.password_salt) {
                    const isValid = await verifyPassword(password, foundUser.password_salt, foundUser.password_hash);
                    if (isValid) user = foundUser;
                }
            } else {
                let users = JSON.parse(localStorage.getItem('yayehui_registered_users') || '[]');
                const foundUser = users.find(u => (u.user_name === account || u.phone === account));
                if (foundUser && foundUser.passwordHash && foundUser.passwordSalt) {
                    const isValid = await verifyPassword(password, foundUser.passwordSalt, foundUser.passwordHash);
                    if (isValid) user = foundUser;
                }
            }
        }
        
        if (user) {
            currentUser = user;
            localStorage.setItem('yayehui_current_user', JSON.stringify(currentUser));
            hideLoginModal();
            alert('鐧诲綍鎴愬姛锛? + (isAdmin ? ' (绠＄悊鍛?' : ''));
            location.reload();
        } else {
            alert('鐢ㄦ埛鍚嶆垨瀵嗙爜閿欒');
        }
    } catch (e) {
        console.error('Login error:', e);
        alert('鐧诲綍澶辫触锛岃绋嶅悗閲嶈瘯');
    }
};

            }

                id: users.length ? Math.max(...users.map(u => u.id)) + 1 : 1,
