<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据迁移工具 V3 - localStorage → Supabase</title>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
  .card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
  h2 { margin-top: 0; color: #333; }
  button { background: #e74c3c; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; margin: 8px 8px 8px 0; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  button.secondary { background: #3498db; }
  #log { background: #1e1e1e; color: #0f0; padding: 16px; border-radius: 6px; height: 380px; overflow-y: auto; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
  .status { padding: 12px; border-radius: 6px; margin: 12px 0; }
  .status.ok { background: #d4edda; color: #155724; }
  .status.err { background: #f8d7da; color: #721c24; }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  th, td { padding: 8px 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
  th { background: #f0f0f0; }
</style>
</head>
<body>

<div class="card">
  <h2>📦 数据迁移工具 V3</h2>
  <p>将当前浏览器 <b>localStorage</b> 数据迁移到 <b>Supabase</b>，实现跨设备同步。</p>
  <div id="connStatus" class="status">正在连接 Supabase...</div>

  <h3>检测到以下数据（来自 localStorage）：</h3>
  <div id="dataPreview"></div>

  <div style="margin-top: 20px;">
    <button id="btnMigrate" disabled>🚀 开始迁移数据</button>
    <button id="btnClear" class="secondary" style="display:none">🗑️ 清空 localStorage（迁移后执行）</button>
  </div>
</div>

<div class="card">
  <h2>📋 迁移日志</h2>
  <div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://wrodvjsbdrxunaiwoaml.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indyb2R2anNiZHJ4dW5haXdvYW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTg1OTYsImV4cCI6MjA5NTA5NDU5Nn0.fQF-gyK53zsaqyojHxXrCBR5lZ6Ioib4rNvgPZ4J4Ww';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const logEl = document.getElementById('log');
function log(msg, color = '#0f0') {
  const t = new Date().toLocaleTimeString();
  logEl.innerHTML += `<span style="color:${color}">[${t}] ${msg}</span>\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function getLS(key) {
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
}

// ====================================================
// 精确的字段白名单（基于 Supabase 实际表结构）
// ====================================================
const TABLE_SCHEMA = {
  announcements:     ['title', 'date', 'content'],
  dynamics:          ['title', 'date', 'summary', 'content'],
  members:           ['name', 'role', 'avatar_icon', 'description'],
  polls:             ['title', 'description', 'start_date', 'end_date', 'is_active'],
  poll_options:      ['poll_id', 'option_text'],
  votes:             ['poll_id', 'property_address', 'option_id', 'voted_at'],
  expenses:          ['category', 'item_name', 'amount', 'date', 'remark'],
  topics:            ['title', 'content', 'author', 'view_count', 'reply_count'],
  replies:           ['topic_id', 'content', 'author'],
  registered_users:  ['user_name', 'phone', 'password', 'property_address', 'is_verified'],
  property_addresses:['address', 'building', 'floor', 'unit', 'is_registered'],
  admin_accounts:    ['username', 'password', 'role'],
  admin_login_logs:  ['username', 'login_time', 'ip_address'],
  site_settings:     ['setting_key', 'setting_value', 'description'],
};

// 主键映射：localStorage 中数字 id → Supabase 中的 id（用于外键修复）
const idRemapPolls = {};   // localPollId → supabasePollId
const idRemapTopics = {};  // localTopicId → supabaseTopicId

function cleanRow(row, tableName) {
  const allowed = TABLE_SCHEMA[tableName] || [];
  const out = {};
  for (const f of allowed) {
    if (row[f] !== undefined && row[f] !== null) {
      out[f] = row[f];
    }
  }
  return out;
}

async function migrateTable(tableName, lsKey, opts = {}) {
  const raw = getLS(lsKey);
  const data = Array.isArray(raw) ? raw : (raw ? [raw] : []);

  if (data.length === 0) {
    log(`  ${tableName}: 无数据，跳过`, '#888');
    return { inserted: 0, failed: 0 };
  }

  log(`  📤 ${tableName}: ${data.length} 条...`, '#ff0');

  let success = 0, fail = 0;
  const inserted = [];

  for (let i = 0; i < data.length; i++) {
    const row = data[i];
    let clean = cleanRow(row, tableName);

    // 修复外键：poll_options 和 votes 中 poll_id 需要映射
    if ((tableName === 'poll_options' || tableName === 'votes') && clean.poll_id) {
      const mapped = idRemapPolls[clean.poll_id];
      if (mapped) clean.poll_id = mapped;
    }
    // 修复外键：replies 中 topic_id 需要映射
    if (tableName === 'replies' && clean.topic_id) {
      const mapped = idRemapTopics[clean.topic_id];
      if (mapped) clean.topic_id = mapped;
    }

    if (Object.keys(clean).length === 0) {
      log(`    #${i+1}: 无有效字段，跳过`, '#888');
      fail++;
      continue;
    }

    const { data: ins, error } = await db.from(tableName).insert(clean).select('id');
    if (error) {
      log(`    #${i+1}: ❌ ${error.message}`, '#f44');
      fail++;
    } else {
      success++;
      inserted.push({ localId: row.id, newId: ins?.[0]?.id });
      // 记录 id 映射
      if (tableName === 'polls' && row.id && ins?.[0]?.id) {
        idRemapPolls[row.id] = ins[0].id;
      }
      if (tableName === 'topics' && row.id && ins?.[0]?.id) {
        idRemapTopics[row.id] = ins[0].id;
      }
    }
  }

  const el = document.getElementById(`st-${tableName}`);
  if (el) {
    if (fail === 0) {
      el.innerHTML = `✅ ${success} 条`;
    } else if (success > 0) {
      el.innerHTML = `⚠️ ${success}/${data.length}`;
    } else {
      el.innerHTML = `❌ 全部失败`;
    }
  }

  if (fail === 0) {
    log(`  ✅ ${tableName}: ${success} 条成功`, '#0f0');
  } else {
    log(`  ⚠️ ${tableName}: ${success} 成功, ${fail} 失败`, '#f90');
  }

  return { inserted: success, failed: fail };
}

const MIGRATIONS = [
  // 无外键依赖的表（先迁移）
  { table: 'property_addresses',  key: 'yayehui_property_addresses' },
  { table: 'announcements',       key: 'yayehui_announcements' },
  { table: 'dynamics',            key: 'yayehui_dynamics' },
  { table: 'members',             key: 'yayehui_members' },
  { table: 'expenses',            key: 'yayehui_expenses' },
  { table: 'admin_accounts',      key: 'yayehui_admin_accounts' },
  { table: 'admin_login_logs',    key: 'yayehui_admin_login_logs' },
  { table: 'site_settings',       key: 'yayehui_site_settings' },
  { table: 'registered_users',    key: 'yayehui_registered_users' },
  // 父表（需要在子表前迁移，并记录 id 映射）
  { table: 'polls',               key: 'yayehui_polls' },
  { table: 'topics',              key: 'yayehui_topics' },
  // 子表（依赖父表的 id）
  { table: 'poll_options',        key: 'yayehui_poll_options' },
  { table: 'votes',               key: 'yayehui_votes' },
  { table: 'replies',             key: 'yayehui_replies' },
];

function previewData() {
  const el = document.getElementById('dataPreview');
  let html = '<table><tr><th>数据表</th><th>本地条数</th><th>Supabase 状态</th></tr>';
  for (const m of MIGRATIONS) {
    const data = getLS(m.key);
    const count = Array.isArray(data) ? data.length : (data ? 1 : 0);
    html += `<tr><td>${m.table}</td><td>${count} 条</td><td id="st-${m.table}">待迁移</td></tr>`;
  }
  html += '</table>';
  el.innerHTML = html;
}

async function doMigrate() {
  const btn = document.getElementById('btnMigrate');
  btn.disabled = true;
  btn.textContent = '⏳ 迁移中...';
  log('=== 开始迁移 ===', '#0ff');

  let totalOk = 0, totalFail = 0;
  for (const m of MIGRATIONS) {
    const r = await migrateTable(m.table, m.key);
    totalOk += r.inserted;
    totalFail += r.failed;
  }

  log(`\n=== 迁移完成: ${totalOk} 成功, ${totalFail} 失败 ===`,
    totalFail === 0 ? '#0ff' : '#f90');

  btn.textContent = totalFail === 0 ? '✅ 全部成功' : '⚠️ 部分完成';

  if (totalOk > 0) {
    document.getElementById('btnClear').style.display = 'inline-block';
  }
}

function doClear() {
  if (!confirm('确认清空 localStorage 吗？\n迁移成功后数据已在 Supabase，可以清空本地缓存。')) return;
  // 只清空业务数据，保留非业务 key
  const businessKeys = MIGRATIONS.map(m => m.key);
  businessKeys.push('yayehui_current_user', 'yayehui_current_panel');
  for (const k of businessKeys) localStorage.removeItem(k);
  log('✅ localStorage 业务数据已清空', '#0f0');
  alert('清空完成！请刷新前端页面，系统将从 Supabase 读取数据。');
}

async function init() {
  const statusEl = document.getElementById('connStatus');
  try {
    const { error } = await db.from('property_addresses').select('id').limit(1);
    if (error) throw error;
    statusEl.className = 'status ok';
    statusEl.innerHTML = '✅ Supabase 连接成功！';
    document.getElementById('btnMigrate').disabled = false;
    previewData();
    log('已就绪，Supabase 连接成功');
  } catch (e) {
    statusEl.className = 'status err';
    statusEl.innerHTML = '❌ Supabase 连接失败：' + e.message;
    log('连接失败: ' + e.message, '#f44');
  }
}

document.getElementById('btnMigrate').addEventListener('click', doMigrate);
document.getElementById('btnClear').addEventListener('click', doClear);
init();
</script>
</body>
</html>
