<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>雅业会 · 管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', 'Inter', sans-serif; background: #eef2f0; padding: 24px; }
        .login-container, .admin-container { max-width: 1400px; margin: 0 auto; }
        .login-box { background: white; max-width: 420px; margin: 80px auto; padding: 36px; border-radius: 32px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .login-box h2 { color: #2c6e49; margin-bottom: 28px; }
        .login-box input { width: 100%; padding: 12px 16px; margin: 10px 0; border: 1px solid #cbdcd0; border-radius: 40px; font-size: 1rem; }
        .login-box button { background: #2c6e49; color: white; border: none; padding: 12px; width: 100%; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .login-box button:hover { background: #1f553a; }
        .admin-header { background: white; border-radius: 28px; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .admin-header h1 { font-size: 1.5rem; color: #1f4f2d; }
        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab-bar { background: white; border-radius: 20px; padding: 8px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .tab-btn { padding: 8px 18px; border-radius: 40px; border: none; cursor: pointer; font-weight: 500; background: transparent; color: #6c7a91; transition: 0.2s; font-size: 0.9rem; }
        .tab-btn.active { background: #2c6e49; color: white; }
        .tab-btn:hover { background: #e2efe6; }
        .btn-outline { background: #e2e8f0; border: none; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; font-size: 0.85rem; }
        .btn-outline:hover { background: #cbd5e1; }
        .btn-outline.danger { background: #fee2e2; color: #991b1b; }
        .btn-outline.danger:hover { background: #fecaca; }
        .btn-sm { background: none; border: 1px solid #cfdfd3; padding: 5px 14px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
        .btn-sm:hover { background: #f0f7f1; }
        .btn-sm.danger { color: #c2410c; border-color: #fecaca; }
        .btn-sm.danger:hover { background: #fee2e2; }
        .btn-sm.primary { background: #2c6e49; color: white; border-color: #2c6e49; }
        .btn-sm.primary:hover { background: #1f553a; }
        .btn-sm.success { background: #2c6e49; color: white; border-color: #2c6e49; }
        .btn-sm.success:hover { background: #1f553a; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card-panel { background: white; border-radius: 28px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .card-panel h3 { display: flex; align-items: center; gap: 10px; border-left: 4px solid #2c6e49; padding-left: 14px; margin-bottom: 16px; font-size: 1.25rem; }
        .item-list { max-height: 380px; overflow-y: auto; margin-bottom: 16px; padding-right: 6px; }
        .admin-item { background: #f9fbf8; border-radius: 20px; padding: 12px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; border: 1px solid #eef2f0; gap: 8px; }
        .item-checkbox-wrap { display: flex; align-items: center; padding-right: 8px; }
        .item-checkbox { width: 18px; height: 18px; cursor: pointer; }
        .item-info { flex: 1; font-size: 0.9rem; min-width: 0; }
        .item-info strong { display: block; margin-bottom: 4px; word-break: break-all; }
        .item-info small { color: #6c7a91; }
        .item-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
        .add-form { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
        .add-form input, .add-form textarea, .add-form select { flex: 1; min-width: 120px; padding: 8px 14px; border: 1px solid #cfdfd3; border-radius: 30px; font-family: inherit; font-size: 0.88rem; }
        .add-form button { background: #2c6e49; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 500; white-space: nowrap; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; max-width: 600px; width: 92%; border-radius: 28px; padding: 24px; max-height: 88vh; overflow-y: auto; }
        .modal-content h3 { margin-bottom: 16px; color: #1f4f2d; }
        .modal-content label { font-weight: 600; font-size: 0.9rem; color: #1e293b; display: block; margin: 12px 0 6px; }
        .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 10px 14px; border-radius: 24px; border: 1px solid #cfdfd3; font-family: inherit; }
        .modal-content textarea { border-radius: 16px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .modal-btn { padding: 10px 24px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.2s; }
        .modal-btn.cancel { background: #e2e8f0; color: #1e293b; }
        .modal-btn.save { background: #2c6e49; color: white; }
        .modal-btn.danger { background: #c2410c; color: white; }
        .reply-item { background: #f9fbf8; border-radius: 16px; padding: 10px 14px; margin-bottom: 10px; border-left: 3px solid #2c6e49; }
        .reply-meta { font-size: 0.75rem; color: #6c7a91; margin-bottom: 6px; }
        .stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
        .stat-card { background: linear-gradient(135deg, #2c6e49, #4c9f70); color: white; padding: 14px 20px; border-radius: 20px; flex: 1; min-width: 140px; text-align: center; }
        .stat-card .num { font-size: 1.8rem; font-weight: 800; }
        .stat-card .label { font-size: 0.8rem; opacity: 0.9; }
        .import-section { background: #f0f7f1; border-radius: 16px; padding: 16px; margin-top: 12px; }
        .import-section h4 { color: #1f4f2d; margin-bottom: 10px; font-size: 0.95rem; }
        .import-section p { font-size: 0.8rem; color: #6c7a91; margin: 4px 0; }
        .template-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .export-btn { background: #3b82f6; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; font-weight: 500; margin-left: 6px; }
        .export-btn:hover { background: #2563eb; }
        .login-log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .login-log-table th, .login-log-table td { padding: 8px 12px; border-bottom: 1px solid #eef2f0; text-align: left; }
        .login-log-table th { background: #eef2f0; color: #1f4f2d; font-weight: 600; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .tag-super { background: #fef3c7; color: #92400e; }
        .tag-admin { background: #dbeafe; color: #1e40af; }
        .user-reg-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #f9fbf8; border-radius: 16px; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .addr-import-area { background: #f8fafc; border: 2px dashed #cfdfd3; border-radius: 20px; padding: 20px; text-align: center; margin-top: 12px; }
        .addr-import-area textarea { width: 100%; height: 140px; border-radius: 16px; border: 1px solid #cfdfd3; padding: 10px; font-family: inherit; resize: vertical; }
        .settings-item { display: flex; align-items: center; gap: 10px; background: #f9fbf8; border-radius: 16px; padding: 12px 16px; margin-bottom: 10px; flex-wrap: wrap; }
        .settings-item label { font-weight: 600; color: #1f4f2d; min-width: 140px; font-size: 0.9rem; }
        .settings-item input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #cfdfd3; font-family: inherit; min-width: 0; }
        .loading { text-align: center; padding: 20px; color: #6c7a91; }
        @media (max-width: 780px) { body { padding: 12px; } .dashboard-grid { grid-template-columns: 1fr; } }
    
/* 操作锁样式 */
.op-lock-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    z-index: 99999;
    justify-content: center;
    align-items: center;
}
.op-lock-overlay.active { display: flex; }
.op-lock-box {
    background: white;
    border-radius: 12px;
    padding: 32px 48px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.op-lock-box .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e0e0e0;
    border-top-color: #2c6e49;
    border-radius: 50%;
    animation: op-spin 0.8s linear infinite;
    margin: 0 auto 16px;
}
@keyframes op-spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>
<div class="op-lock-overlay" id="opLockOverlay">
    <div class="op-lock-box">
        <div class="spinner"></div>
        <div style="color:#2c6e49;font-weight:600;">操作处理中，请稍候...</div>
    </div>
</div>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin_db.js?v=20260611b"></script>
<script src="admin_main.js?v=20260611b"></script>
</body>
</html>
