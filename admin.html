// жУНдљЬйФБеЈ•еЕЈпЉИйШ≤ж≠ҐеєґеПСжУНдљЬпЉ?    const opLock = {
        isOperating: false,
        pendingOp: null,
        show() { 
            this.isOperating = true;
            const el = document.getElementById('opLockOverlay'); 
            if (el) el.classList.add('active'); 
        },
        hide() { 
            this.isOperating = false;

        // ж£АжЯ•жШѓеР¶еПѓдї•жЙІи°МжУНдљ?        canOperate(opType) {

    function withLock(fn, opType) {
        return async function(...args) {

            opLock.show();

            } catch(e) {
                alert('жУНдљЬе§±иі•пЉ? + e.message);
            } finally { 
                opLock.hide();
            }
        };
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function nextId(arr) { return arr.length ? Math.max(...arr.map(i => i.id)) + 1 : 1; }

    // жЦЗдїґиѓїеПЦиЊЕеК©еЗљжХ∞ - жФѓжМБ UTF-8/GBK/GB2312 иЗ™еК®иѓЖеИЂпЉМеЄ¶BOMе§ДзРЖ
    function readTextFileWithEncoding(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const buffer = e.target.result;
                    // еЕИе∞Эиѓ?UTF-8 иІ£з†Б
                    let text = new TextDecoder('utf-8', { fatal: true }).decode(buffer);
                    // зІїйЩ§ BOM е≠Чзђ¶
                    if (text.charCodeAt(0) === 0xFEFF) {
                        text = text.slice(1);
                    }
                    resolve(text);
                } catch (err) {
                    // UTF-8 е§±иі•пЉМе∞Эиѓ?GBKпЉИWindowsдЄ≠жЦЗExcelйїШиЃ§зЉЦз†БпЉ?                    try {
                        const text = new TextDecoder('gbk').decode(e.target.result);
                        resolve(text);
                    } catch (err2) {
                        // еЖНе∞Эиѓ?GB2312
                        try {
                            const text = new TextDecoder('gb2312').decode(e.target.result);
                            resolve(text);
                        } catch (err3) {
                            // жЬАеРОе∞Эиѓ?Latin1 дљЬдЄЇеРОе§З
                            try {
                                const text = new TextDecoder('latin1').decode(e.target.result);
                                resolve(text);
                            } catch (err4) {
                                reject(new Error('жЧ†ж≥ХиѓЖеИЂжЦЗдїґзЉЦз†БпЉМиѓЈе∞ЖжЦЗдїґдњЭе≠ШдЄЇUTF-8зЉЦз†БзЪДCSV'));
                            }
                        }
                    }
                }
            };
            reader.onerror = function() {
                reject(new Error('жЦЗдїґиѓїеПЦе§±иі•'));
            };
            reader.readAsArrayBuffer(file);
        });
    }
    
    // CSVиІ£жЮРиЊЕеК©еЗљжХ∞ - е§ДзРЖеЄ¶еЉХеПЈзЪДе≠ЧжЃµ
    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current.trim().replace(/^"|"$/g, ''));
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim().replace(/^"|"$/g, ''));
        return result;
    }

    function exportData(data, filename, columns) {
        if (!data || data.length === 0) { alert('ж≤°жЬЙжХ∞жНЃеПѓеѓЉеЗ?); return; }
        let csv = columns.map(c => c.label).join(',') + '\n';
        data.forEach(row => {
            csv += columns.map(c => {
                let val = row[c.key] !== undefined ? row[c.key] : '';
                if (typeof val === 'string') val = '"' + val.replace(/"/g, '""') + '"';
                return val;
            }).join(',') + '\n';
        });
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = filename + '.csv'; a.click();
        URL.revokeObjectURL(url);
    }

    function downloadTemplate(columns, filename) {

                    <h4><i class="fas fa-user-cog"></i> зЃ°зРЖеСШиі¶еПЈзЃ°зР?/h4>
                    <div class="item-list" id="adminAccountsList"><div class="loading">еК†иљљдЄ?..</div></div>
                    <button class="btn-sm success" style="margin-top:8px;" onclick="showAddAdminModal()"><i class="fas fa-user-plus"></i> жЦ∞еҐЮзЃ°зРЖеСШиі¶еП?/button>
                </div>
                <div class="import-section" style="margin-top:16px;">
                    <h4><i class="fas fa-history"></i> зЩїељХжЧ•ењЧ</h4>
                    <div class="item-list" id="loginLogsList" style="max-height:280px;"><div class="loading">еК†иљљдЄ?..</div></div>
                    <button class="btn-sm" style="margin-top:8px;" onclick="clearLoginLogs()"><i class="fas fa-trash-alt"></i> жЄЕз©ЇжЧ•ењЧ</button>
                </div>
            </div>`;
        renderAdminAccountsList();
        renderLoginLogs();
    }
    async function renderAdminAccountsList() {
        const list = document.getElementById('adminAccountsList');
        if (!list) return;
        const accounts = await getAllAdminAccounts();
        list.innerHTML = accounts.map(a => `<div class="admin-item"><div class="item-info"><strong>${escapeHtml(a.username)}</strong> <span class="tag ${a.role==='super_admin'?'tag-super':'tag-admin'}">${a.role==='super_admin'?'иґЕзЇІзЃ°зРЖеС?:'зЃ°зРЖеС?}</span><br><small>еИЫеїЇ: ${formatDate(a.created_at)}</small></div><div class="item-actions"><button class="btn-sm" onclick="resetAdminPwd('${a.username}')"><i class="fas fa-key"></i> йЗНзљЃеѓЖз†Б</button><button class="btn-sm" onclick="showAdminPwd('${a.username}')"><i class="fas fa-eye"></i> жЯ•зЬЛеѓЖз†Б</button>${a.username!=='superadmin'?`<button class="btn-sm danger" onclick="deleteAdminAccount('${a.username}')"><i class="fas fa-trash-alt"></i></button>`:''}</div></div>`).join('') || '<p class="loading">жЪВжЧ†иі¶еПЈ</p>';
    }
    async function renderLoginLogs() {
        const list = document.getElementById('loginLogsList');
        if (!list) return;
        const logs = await getAllLoginLogs();
        list.innerHTML = logs.map(l => `<div class="admin-item"><div class="item-info"><strong>${escapeHtml(l.username)}</strong><br><small>${formatDate(l.login_time)}</small><br><small>IP: ${escapeHtml(l.ip_address||'жЬ™зЯ•')}</small></div></div>`).join('') || '<p class="loading">жЪВжЧ†зЩїељХиЃ∞ељХ</p>';
    }
    window.showAddAdminModal = () => {
        showModal(`<span style="float:right;cursor:pointer;font-size:24px;" onclick="closeModal()">&times;</span>
            <h3><i class="fas fa-user-plus"></i> жЦ∞еҐЮзЃ°зРЖеСШиі¶еП?/h3>
            <label>зФ®жИЈеР?/label><input type="text" id="newAdminUsername" placeholder="иЊУеЕ•зФ®жИЈеР?>
            <label>еѓЖз†Б</label><input type="password" id="newAdminPwd" placeholder="иЊУеЕ•еѓЖз†Б">
            <label>иІТиЙ≤</label><select id="newAdminRole"><option value="admin">зЃ°зРЖеС?/option><option value="super_admin">иґЕзЇІзЃ°зРЖеС?/option></select>
            <div class="modal-footer"><button class="modal-btn cancel" onclick="closeModal()">еПЦжґИ</button><button class="modal-btn save" onclick="addAdminAccount()">еИЫеїЇиі¶еПЈ</button></div>`);
    };
    window.addAdminAccount = async () => {
            opLock.show();
            try {
                const u = document.getElementById('newAdminUsername')?.value.trim();
        const p = document.getElementById('newAdminPwd')?.value;
        const r = document.getElementById('newAdminRole')?.value;
        if (!u || !p) return alert('иѓЈе°ЂеЖЩзФ®жИЈеРНеТМеѓЖз†?);
        const data = { username: u, password: p, role: r || 'admin' };
        if (USE_SUPABASE) {
            const existing = await getAllAdminAccounts();
            if (existing.find(a => a.username === u)) return alert('зФ®жИЈеРНеЈ≤е≠ШеЬ®');
            await db.adminAccounts.create(data);
        } else {
            let accounts = JSON.parse(localStorage.getItem('yayehui_admin_accounts') || '[]');
            if (accounts.find(a => a.username === u)) return alert('зФ®жИЈеРНеЈ≤е≠ШеЬ®');
            data.id = nextId(accounts);
            accounts.push(data);
            localStorage.setItem('yayehui_admin_accounts', JSON.stringify(accounts));
        }
        closeModal();
        alert('иі¶еПЈеИЫеїЇжИРеКЯпЉ?);
        renderAdminAccountsList();
            } finally {
                opLock.hide();
            }
        };
    window.deleteAdminAccount = async (username) => {
            opLock.show();
            try {
                if(!confirm(`з°ЃеЃЪеИ†йЩ§зЃ°зРЖеСШиі¶еПЈгА?{username}гАНпЉЯ`))return; if(USE_SUPABASE)await db.adminAccounts.delete(username); else{let a=JSON.parse(localStorage.getItem('yayehui_admin_accounts')||'[]').filter(i=>i.username!==username);localStorage.setItem('yayehui_admin_accounts',JSON.stringify(a));} renderAdminAccountsList();
            } finally {
                opLock.hide();
            }
        };
    window.resetAdminPwd = async (username) => {
            opLock.show();
            try {
                const newPwd = prompt(`дЄЇгА?{username}гАНиЃЊзљЃжЦ∞еѓЖз†БпЉЪ`); if(!newPwd||!newPwd.trim())return; if(USE_SUPABASE)await db.adminAccounts.updatePwd(username,newPwd); else{let a=JSON.parse(localStorage.getItem('yayehui_admin_accounts')||'[]');const r=a.find(i=>i.username===username);if(r){r.password=newPwd;localStorage.setItem('yayehui_admin_accounts',JSON.stringify(a));}} alert(`гА?{username}гАНеѓЖз†БеЈ≤йЗНзљЃдЄЇпЉЪ${newPwd}`);
            } finally {
                opLock.hide();
            }
        };
    window.showAdminPwd = async (username) => { const accounts = await getAllAdminAccounts(); const acc = accounts.find(a=>a.username===username); alert(`гА?{username}гАНзЪДеѓЖз†БжШѓпЉЪ${acc?.password||'жЬ™зЯ•'}`); };
    window.clearLoginLogs = async () => {
            opLock.show();
            try {
                if(!confirm('з°ЃеЃЪжЄЕз©ЇзЩїељХжЧ•ењЧпЉ?))return; if(USE_SUPABASE){const logs=await getAllLoginLogs();for(const l of logs)await db.adminLoginLogs.delete(l.id);} else localStorage.setItem('yayehui_login_logs','[]'); renderLoginLogs();
            } finally {
                opLock.hide();
            }
        };

    // ж†Зз≠ЊеИЗжНҐ
    window.showPanel = function(panelId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const btn = document.querySelector(`.tab-btn[data-panel="${panelId}"]`);
        if (btn) btn.classList.add('active');
        const panel = document.getElementById('panel' + panelId);
        if (panel) panel.classList.add('active');
        // дњЭе≠ШељУеЙНйЭҐжЭњ
        sessionStorage.setItem('yayehui_current_panel', panelId);
        // еїґињЯжЄ≤жЯУ
        setTimeout(() => {
            if (panelId === 'Announcements') renderAnnouncementsPanel();
            else if (panelId === 'Dynamics') renderDynamicsPanel();
            else if (panelId === 'Members') renderMembersPanel();
            else if (panelId === 'Polls') renderPollsPanel();
            else if (panelId === 'Expenses') renderExpensesPanel();
            else if (panelId === 'Topics') renderTopicsPanel();
            else if (panelId === 'Users') renderUsersPanel();
            else if (panelId === 'Property') renderPropertyPanel();
            else if (panelId === 'SiteSettings') renderSiteSettingsPanel();
            else if (panelId === 'SuperAdmin') renderSuperAdminPanel();
        }, 50);
    };

    // зЩїељХйАїиЊС
    async function doLogin(username, password) {
        if (USE_SUPABASE) {
            const accounts = await db.adminAccounts.getAll() || [];
            const acc = accounts.find(a => a.username === username && a.password === password);
            if (acc) {
                currentUser = username;
                isSuperAdmin = acc.role === 'super_admin';
                // дњЭе≠ШзЩїељХдЉЪиѓЭ
                saveSession();
                // иЃ∞ељХзЩїељХжЧ•ењЧ
                await db.adminLoginLogs.create({ username, login_time: new Date().toISOString(), ip_address: '' });
                showAdminPanel();
                return true;
            }
        }
        // еЫЮйАА
        const localAccounts = JSON.parse(localStorage.getItem('yayehui_admin_accounts') || '[{"username":"admin","password":"yayehui2025","role":"admin"},{"username":"superadmin","password":"super2025","role":"super_admin"}]');
        const acc = localAccounts.find(a => a.username === username && a.password === password);
        if (acc) {
            currentUser = username;
            isSuperAdmin = acc.role === 'super_admin';
            // дњЭе≠ШзЩїељХдЉЪиѓЭ
            saveSession();
            let logs = JSON.parse(localStorage.getItem('yayehui_login_logs') || '[]');
            logs.unshift({ username, login_time: new Date().toISOString(), ip_address: '' });
            if (logs.length > 100) logs = logs.slice(0, 100);
            localStorage.setItem('yayehui_login_logs', JSON.stringify(logs));
            showAdminPanel();
            return true;
        }
        return false;
    }

    function showLogin() {
        document.getElementById('app').innerHTML = `<div class="login-container"><div class="login-box">
            <i class="fas fa-lock" style="font-size:48px;color:#2c6e49;"></i>
            <h2>йЫЕдЄЪдЉ?зЃ°зРЖеРОеП∞</h2>
            <input type="text" id="loginUsername" placeholder="зФ®жИЈеР? autocomplete="off">
            <input type="password" id="loginPassword" placeholder="еѓЖз†Б">
            <button id="doLoginBtn">зЩїељХз≥їзїЯ</button>
            <p style="margin-top:16px;font-size:0.8rem;color:#6c7a91;">еИЭеІЛиі¶еПЈ: admin / yayehui2025</p>
        </div></div>`;
        document.getElementById('doLoginBtn').onclick = async () => {
            const u = document.getElementById('loginUsername').value.trim();
            const p = document.getElementById('loginPassword').value;
            const ok = await doLogin(u, p);
            if (!ok) alert('зФ®жИЈеРНжИЦеѓЖз†БйФЩиѓѓ');
        };
        document.getElementById('loginPassword').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const u = document.getElementById('loginUsername').value.trim();
                const p = document.getElementById('loginPassword').value;
                const ok = await doLogin(u, p);
                if (!ok) alert('зФ®жИЈеРНжИЦеѓЖз†БйФЩиѓѓ');
            }
        });
    }
    
    // ж£АжЯ•дњЭе≠ШзЪДзЩїељХдЉЪиѓЭ
    function checkSavedSession() {
        const savedSession = localStorage.getItem('yayehui_admin_session');
        if (savedSession) {
            try {
                const session = JSON.parse(savedSession);
                if (session && session.username && session.isSuperAdmin !== undefined) {
                    currentUser = session.username;
                    isSuperAdmin = session.isSuperAdmin;
                    return true;
                }
            } catch (e) {
                localStorage.removeItem('yayehui_admin_session');
            }
        }
        return false;
    }
    
    // дњЭе≠ШзЩїељХдЉЪиѓЭ
    function saveSession() {
        localStorage.setItem('yayehui_admin_session', JSON.stringify({
            username: currentUser,
            isSuperAdmin: isSuperAdmin
        }));
    }
    
    // жЄЕйЩ§зЩїељХдЉЪиѓЭ
    function clearSession() {
        localStorage.removeItem('yayehui_admin_session');
    }

    function showAdminPanel() {
        const superAdminTab = isSuperAdmin ? `<button class="tab-btn" data-panel="SuperAdmin" onclick="showPanel('SuperAdmin')"><i class="fas fa-shield-alt"></i> иґЕзЇІзЃ°зРЖ</button>` : '';
        document.getElementById('app').innerHTML = `<div class="admin-container">
            <div class="admin-header">
                <h1><i class="fas fa-tree"></i> йЫЕдЄЪдЉ?¬Ј зЃ°зРЖеРОеП∞ <small style="font-size:0.7rem;color:#6c7a91;font-weight:normal;">(${currentUser})</small></h1>
                <div class="header-buttons">
                    ${superAdminTab}
                    <button class="btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> йААеЗ?/button>
                </div>
            </div>
            <div class="tab-bar">
                <button class="tab-btn active" data-panel="Announcements" onclick="showPanel('Announcements')"><i class="fas fa-bullhorn"></i> еЕђеСК</button>
                <button class="tab-btn" data-panel="Dynamics" onclick="showPanel('Dynamics')"><i class="fas fa-chart-line"></i> еК®жА?/button>
                <button class="tab-btn" data-panel="Members" onclick="showPanel('Members')"><i class="fas fa-users"></i> жИРеСШ</button>
                <button class="tab-btn" data-panel="Polls" onclick="showPanel('Polls')"><i class="fas fa-vote-yea"></i> жКХз•®</button>
                <button class="tab-btn" data-panel="Expenses" onclick="showPanel('Expenses')"><i class="fas fa-chart-pie"></i> иієзФ®</button>
                <button class="tab-btn" data-panel="Topics" onclick="showPanel('Topics')"><i class="fas fa-comments"></i> ењГе£∞</button>
                <button class="tab-btn" data-panel="Users" onclick="showPanel('Users')"><i class="fas fa-user-check"></i> ж≥®еЖМзФ®жИЈ</button>
                <button class="tab-btn" data-panel="Property" onclick="showPanel('Property')"><i class="fas fa-map-marked-alt"></i> жИњдЇІеЬ∞еЭА</button>
                <button class="tab-btn" data-panel="SiteSettings" onclick="showPanel('SiteSettings')"><i class="fas fa-cog"></i> зЂЩзВєиЃЊзљЃ</button>
            </div>
            <div id="panelAnnouncements" class="panel active"></div>
            <div id="panelDynamics" class="panel"></div>
            <div id="panelMembers" class="panel"></div>
            <div id="panelPolls" class="panel"></div>
            <div id="panelExpenses" class="panel"></div>
            <div id="panelTopics" class="panel"></div>
            <div id="panelUsers" class="panel"></div>
            <div id="panelProperty" class="panel"></div>
            <div id="panelSiteSettings" class="panel"></div>
            <div id="panelSuperAdmin" class="panel"></div>
        </div>`;
        document.getElementById('logoutBtn').onclick = () => { 
            currentUser = null; 
            isSuperAdmin = false; 
            clearSession();
            showLogin(); 
        };
        // еК†иљљдЄКжђ°дњЭе≠ШзЪДйЭҐжЭ?        const savedPanel = sessionStorage.getItem('yayehui_current_panel') || 'Announcements';
        setTimeout(() => showPanel(savedPanel), 50);
    }
    
    // еРѓеК®жЧґж£АжЯ•дЉЪиѓ?    if (checkSavedSession()) {
        showAdminPanel();
    } else {
        showLogin();
    }
</script>
